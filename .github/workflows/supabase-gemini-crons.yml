name: Supabase & Gemini Cron Jobs

on:
  schedule:
    - cron: '*/10 * * * *' # Executa a fila de embeddings a cada 10 minutos
    - cron: '0 0 * * *'    # Limpa storage diariamente à meia-noite
  workflow_dispatch:
    inputs:
      job:
        description: 'Qual job executar (queue, cleanup ou ambos)'
        required: true
        default: 'queue'
        type: choice
        options:
          - queue
          - cleanup
          - ambos

jobs:
  trigger-crons:
    runs-on: ubuntu-latest
    steps:
      - name: Processar Fila de Vetorização (Gemini)
        if: |
          github.event_name == 'schedule' && github.event.schedule == '*/10 * * * *' ||
          github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'queue' || github.event.inputs.job == 'ambos')
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::A variável APP_URL está vazia. Certifique-se de configurar o secret APP_URL nas configurações do seu repositório no GitHub (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          
          URL="$APP_URL"
          if [[ ! "$URL" =~ ^https?:// ]]; then
            URL="https://$URL"
          fi
          
          echo "Disparando processador de fila em $URL..."
          curl -fail -X POST "$URL/api/cron/process-queue" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Length: 0"
          echo "Processamento concluído com sucesso."

      - name: Limpeza de Storage (PDFs Órfãos)
        if: |
          github.event_name == 'schedule' && github.event.schedule == '0 0 * * *' ||
          github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'cleanup' || github.event.inputs.job == 'ambos')
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::A variável APP_URL está vazia. Certifique-se de configurar o secret APP_URL nas configurações do seu repositório no GitHub (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          
          URL="$APP_URL"
          if [[ ! "$URL" =~ ^https?:// ]]; then
            URL="https://$URL"
          fi
          
          echo "Disparando limpeza de storage em $URL..."
          curl -fail -X GET "$URL/api/cron/cleanup-storage" \
            -H "Authorization: Bearer $CRON_SECRET"
          echo "Limpeza de storage concluída com sucesso."

